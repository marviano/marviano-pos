<!--
  Template: slip pesanan (ukuran kertas = struk 80mm, 42ch).
  Isi: waiter, pelanggan, meja, waktu pesanan, lalu produk dikelompokkan HANYA berdasarkan Category 1 (nama dari DB, contoh: Makanan, Minuman).
  Contoh tampilan:
    MAKANAN:
    - AYAM GORENG
    - NASI GORENG
    MINUMAN:
    - ES TEH
    - ES JERUK
  Placeholders: {{waiterName}}, {{customerName}}, {{tableName}}, {{orderTime}}, {{categoriesSections}} (semua kategori), {{leftPadding}}, {{rightPadding}}.
  Padding: {{leftPadding}}, {{rightPadding}} — body padding.
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @page { size: 80mm auto; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', 'Helvetica', sans-serif;
      width: 42ch;
      max-width: 42ch;
      font-size: 10pt;
      font-weight: 500;
      line-height: 1.2;
      padding: 2mm {{rightPadding}}mm 2mm {{leftPadding}}mm;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .dashed-line { border-top: 1px dashed #000; margin: 1.5mm 0; }
    .info-line { display: flex; justify-content: space-between; margin-bottom: 0.5mm; }
    .info-label { font-size: 9pt; font-weight: 500; }
    .info-value { font-size: 9pt; font-weight: 700; }
    .category-section { margin: 1.5mm 0; }
    .category-title { font-size: 9pt; font-weight: 700; margin-bottom: 0.5mm; }
    .item-line { font-size: 9pt; margin: 0.5mm 0; }
    table { width: 100%; border-collapse: collapse; margin: 1mm 0; font-size: 9pt; table-layout: fixed; }
    th { text-align: left; font-weight: 700; border-bottom: 1px solid #000; padding: 0.5mm 0; font-size: 8pt; }
    td { padding: 0.5mm 0; font-weight: 500; }
    td:first-child { word-wrap: break-word; overflow-wrap: break-word; }
  </style>
</head>
<body>
  <div class="dashed-line"></div>

  <div class="info-line">
    <span class="info-label">Waiter:</span>
    <span class="info-value">{{waiterName}}</span>
  </div>
  <div class="info-line">
    <span class="info-label">Pelanggan:</span>
    <span class="info-value">{{customerName}}</span>
  </div>
  <div class="info-line">
    <span class="info-label">Meja:</span>
    <span class="info-value">{{tableName}}</span>
  </div>
  <div class="info-line">
    <span class="info-label">Waktu Pesanan:</span>
    <span class="info-value">{{orderTime}}</span>
  </div>

  <div class="dashed-line"></div>

  {{categoriesSections}}

  <div class="dashed-line"></div>
</body>
</html>
