<!--
  Template: slip pesanan (ukuran kertas = 72mm, sama seperti Print All Ganti Shift — agar tidak terpotong kanan).
  Isi: waiter, pelanggan, meja, waktu pesanan, lalu produk dikelompokkan HANYA berdasarkan Category 1 (nama dari DB, contoh: Makanan, Minuman).
  Placeholders: {{waiterName}}, {{customerName}}, {{tableName}}, {{orderTime}}, {{categoriesSections}}, {{leftPadding}}, {{rightPadding}}.
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @page { size: 72mm auto; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', 'Helvetica', sans-serif;
      width: 100%;
      max-width: 72mm;
      font-size: 10pt;
      font-weight: 500;
      line-height: 1.2;
      padding: 1.5mm {{rightPadding}}mm 1.5mm {{leftPadding}}mm;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .dashed-line { border-top: 1px dashed #000; margin: 1.5mm 0; }
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 1mm; table-layout: auto; }
    .info-table td { padding: 0 0 0.5mm 0; font-size: 9pt; vertical-align: top; }
    .info-table td.lbl { font-weight: 500; white-space: nowrap; padding-right: 3.5mm; }
    .info-table td.colon { white-space: nowrap; padding-right: 1mm; font-weight: 500; }
    .info-table td.val { font-weight: 700; word-wrap: break-word; overflow-wrap: break-word; }
    .category-section { margin: 1.5mm 0; }
    .category-title { font-size: 9pt; font-weight: 700; margin-bottom: 0.5mm; }
    .item-line { font-size: 9pt; margin: 0.5mm 0; }
    table { width: 100%; border-collapse: collapse; margin: 1mm 0; font-size: 9pt; table-layout: fixed; }
    th { text-align: left; font-weight: 700; border-bottom: 1px solid #000; padding: 0.5mm 0; font-size: 8pt; }
    td { padding: 0.5mm 0; font-weight: 500; }
    td:first-child { word-wrap: break-word; overflow-wrap: break-word; }
  </style>
</head>
<body>
  <div class="dashed-line"></div>

  <table class="info-table">
    <tr>
      <td class="lbl">Waiter</td>
      <td class="colon">:</td>
      <td class="val">{{waiterName}}</td>
    </tr>
    <tr>
      <td class="lbl">Pelanggan</td>
      <td class="colon">:</td>
      <td class="val">{{customerName}}</td>
    </tr>
    <tr>
      <td class="lbl">Meja</td>
      <td class="colon">:</td>
      <td class="val">{{tableName}}</td>
    </tr>
    <tr>
      <td class="lbl">Waktu Pesanan</td>
      <td class="colon">:</td>
      <td class="val">{{orderTime}}</td>
    </tr>
  </table>

  <div class="dashed-line"></div>

  {{categoriesSections}}

  <div class="dashed-line"></div>
</body>
</html>
