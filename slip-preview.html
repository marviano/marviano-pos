<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Slip Pesanan – Preview (80mm / 42ch)</title>
  <style>
    @page { size: 80mm auto; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', 'Helvetica', sans-serif;
      width: 42ch;
      max-width: 42ch;
      font-size: 10pt;
      font-weight: 500;
      line-height: 1.2;
      padding: 2mm 2mm 2mm 2mm;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .dashed-line { border-top: 1px dashed #000; margin: 1.5mm 0; }
    .info-line { display: flex; justify-content: space-between; margin-bottom: 0.5mm; }
    .info-label { font-size: 9pt; font-weight: 500; }
    .info-value { font-size: 9pt; font-weight: 700; }
    .category-section { margin: 1.5mm 0; }
    .category-title { font-size: 9pt; font-weight: 700; margin-bottom: 0.5mm; }
    .item-line { font-size: 9pt; margin: 0.5mm 0; }
    table { width: 100%; border-collapse: collapse; margin: 1mm 0; font-size: 9pt; table-layout: fixed; }
    th { text-align: left; font-weight: 700; border-bottom: 1px solid #000; padding: 0.5mm 0; font-size: 8pt; }
    td { padding: 0.5mm 0; font-weight: 500; }
    td:first-child { word-wrap: break-word; overflow-wrap: break-word; }

    /* Preview wrapper: show 80mm width on screen */
    .preview-wrapper {
      padding: 24px;
      background: #e0e0e0;
      display: inline-block;
      margin: 20px;
    }
    .preview-wrapper .slip {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .preview-note {
      font-family: sans-serif;
      font-size: 12px;
      color: #666;
      margin-top: 12px;
      max-width: 80mm;
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <div class="slip">
      <div class="dashed-line"></div>

      <div class="info-line">
        <span class="info-label">Waiter:</span>
        <span class="info-value">Budi</span>
      </div>
      <div class="info-line">
        <span class="info-label">Pelanggan:</span>
        <span class="info-value">Sdr. Ahmad</span>
      </div>
      <div class="info-line">
        <span class="info-label">Meja:</span>
        <span class="info-value">Meja 5</span>
      </div>
      <div class="info-line">
        <span class="info-label">Waktu Pesanan:</span>
        <span class="info-value">22/02/2025 14:32</span>
      </div>

      <div class="dashed-line"></div>

      <div class="category-section">
        <div class="category-title">MAKANAN:</div>
        <div class="item-line">- AYAM GORENG</div>
        <div class="item-line">- NASI GORENG</div>
      </div>
      <div class="category-section">
        <div class="category-title">MINUMAN:</div>
        <div class="item-line">- ES TEH</div>
        <div class="item-line">- ES JERUK</div>
      </div>

      <div class="dashed-line"></div>
    </div>
    <p class="preview-note">Preview: slip pesanan (80mm, 42ch). Buka print preview (Ctrl+P) untuk melihat ukuran struk.</p>
  </div>
</body>
</html>
