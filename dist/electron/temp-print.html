<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @page {
      size: 40mm 30mm;
      margin: 0;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      font-size: 10pt;
      width: 40mm;
      padding: 5mm;
      line-height: 1.2;
    }
    .header {
      text-align: center;
      font-weight: bold;
      font-size: 12pt;
      border-bottom: 1px solid #000;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }
    .content p {
      margin: 8px 0;
    }
    .footer {
      margin-top: 15px;
      text-align: center;
      font-size: 8pt;
      border-top: 1px dashed #000;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">TEST PRINT</div>
  <div class="content">
    <p>This is a test print page.</p>
    <p>Printer: NOTA - XP-80C</p>
    <p>Time: 10/28/2025, 10:13:35 AM</p>
    <p>Type: labelPrinter</p>
    <p>Paper Size: 40mm width</p>
    <p>If you can see this, your printer works!</p>
  </div>
  <div class="footer">
    <p>Marviano POS System</p>
    <p>10/28/2025, 10:13:35 AM</p>
  </div>
</body>
</html>
